<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory</title>
    <link rel="icon" href="./src/assets/img/favIcon.png" type="image/x-icon">
</head>

<body id="body" class="body-start">
    <div id="startContent" class="content-wrapper">
        <div class="start-header">
            <h2 class="h2-start">It's play time</h2>
            <h1 class="h1-start">Ready to play?</h1>
        </div>
        <button id="startBtn" class="btn start-btn">
            <img class="before-img" src="./src/assets/img/index/controllerBtn.svg" alt="small image of a controller">
            <span>Play</span>
            <img class="after-img" src="./src/assets/img/index/arrowDef.svg" alt="pointing arrow">
        </button>
    </div>
    <img class="start-img" src="./src/assets/img/index/controllerBig.png" alt="big image of a controller">
    <div id="settingsContent" class="content-wrapper flex-start d-none">
        <h2 class="h2-settings">Settings</h2>
        <div class="settings-layout">
            <section>
                <article class="mrg-bt">
                    <div class="table-header">
                        <img src="./src/assets/img/game/settings/themes.png"
                            alt="palette symbolizing options to play">
                        <h3>Game themes</h3>
                    </div>
                    <ul class="list" id="theme">
                        <li class="list__item" data-id="code">
                            Code vibes theme
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                        <li class="list__item" data-id="projects">
                            DA Projects theme
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                    </ul>
                </article>
                <article class="mrg-bt">
                    <div class="table-header">
                        <img src="./src/assets/img/game/settings/chess_pawn.png" alt="chess pawn symbolizing player">
                        <h3>Choose player</h3>
                    </div>
                    <ul class="list" id="player">
                        <li class="list__item" data-id="blue">
                            Blue
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                        <li class="list__item" data-id="orange">
                            Orange
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                    </ul>
                </article>
                <article class="mrg-bt">
                    <div class="table-header">
                        <img src="./src/assets/img/game/settings/board_size.png"
                            alt="symbolizing amount of cards played with">
                        <h3>Board size</h3>
                    </div>
                    <ul class="list" id="amount">
                        <li class="list__item" data-id="16">
                            16 cards
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                        <li class="list__item" data-id="24">
                            24 cards
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                        <li class="list__item" data-id="36">
                            36 cards
                            <img src="./src/assets/img/game/settings/chosen.png" alt="selected option">
                        </li>
                    </ul>
                </article>
            </section>
            <section class="show-case">
                <div class="show-case__placeholder">
                    <img class="d-none" data-theme="code" src="./src/assets/img/game/settings/screenCode.png"
                        alt="example for gameboard style">
                    <img class="d-none" data-theme="projects" src="./src/assets/img/game/settings/screenDA.png"
                        alt="example for gameboard style">
                </div>
                <div class="info">
                    <span class="info__span" id="themeChosen">Theme</span>
                    <img data-sep="1-def" src="./src/assets/img/game/settings/seperatorDef.png"
                        alt="visual element for seperating options">
                    <img data-sep="1-act" class="d-none" src="./src/assets/img/game/settings/seperatorActive.png"
                        alt="visual element for seperating options">
                    <span class="info__span" id="playerChosen">Player</span>
                    <img  data-sep="2-act" class="d-none" src="./src/assets/img/game/settings/seperatorActive.png"
                        alt="visual element for seperating options">
                    <img  data-sep="2-def" src="./src/assets/img/game/settings/seperatorDef.png"
                        alt="visual element for seperating options">
                    <span class="info__span" id="boardSize">Board size</span>
                    <button onclick="" id="startGame" class="info__btn" disabled>
                        <img class="before-img" src="./src/assets/img/game/settings/startDisabled.svg"
                            alt="icon for start sign">
                        <span>Start</span>
                    </button>
                </div>
            </section>
        </div>
    </div>
</body>
<script type="module" src="./src/main.ts"></script>
<script type="module" src="./src/scripts/start_settings.ts"></script>

</html>
